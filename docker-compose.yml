services:
  postgresql:
    image: postgres:16.3-alpine
    container_name: PostgreSQL-FahimBot-Container
    ports:
      - "25537:5432"
    user: postgres
    environment:
      - POSTGRES_DB=mayan
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=@edDGA6QCID9K$$22
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 30s
      retries: 3
    command: ["-c", "max_connections=300"]
    restart: always
    volumes:
      - type: volume
        source: pgdata
        target: /var/lib/postgresql/data
    networks:
      - services
      - mayan_network

  redis:
    image: redis:7.2-alpine
    container_name: infra_redis_1  # Add explicit container name if not already set
    ports:
      - "6379:6379"
    command: redis-server
    volumes:
      - cache:/server/redis/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - services
      - tutor_network  # Add Tutor network
      - mayan_network
    restart: always

  mayan-app:
    image: mayanedms/mayanedms:s4.10
    container_name: Mayan-App-Container
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MAYAN_CELERY_BROKER_URL: redis://redis:6379/3
      MAYAN_CELERY_RESULT_BACKEND: redis://redis:6379/4
      MAYAN_DATABASES: "{'default':{'ENGINE':'django.db.backends.postgresql','NAME':'mayan','PASSWORD':'@edDGA6QCID9K$$22','USER':'postgres','HOST':'postgresql','PORT':5432}}"
      MAYAN_LOCK_MANAGER_BACKEND: mayan.apps.lock_manager.backends.model_lock.ModelLock
      MAYAN_LOCK_MANAGER_BACKEND_ARGUMENTS: "{}"
      MAYAN_GUNICORN_TIMEOUT: 120
      MAYAN_GUNICORN_WORKER_CLASS: sync
      
      MAYAN_STATIC_URL: /mayan/static/
      MAYAN_ALLOWED_HOSTS: "['dev-back.doc-tell.net', '10.1.0.5', 'dev.doc-tell.net', '*']"
      MAYAN_CSRF_TRUSTED_ORIGINS: "['https://dev-back.doc-tell.net:8443', 'https://dev-back.doc-tell.net', 'https://dev.doc-tell.net:9070', 'http://localhost:5173']"
      MAYAN_USE_X_FORWARDED_HOST: "True"
      MAYAN_USE_X_FORWARDED_PORT: "True"
      MAYAN_SECURE_PROXY_SSL_HEADER: "HTTP_X_FORWARDED_PROTO,https"
      MAYAN_SESSION_COOKIE_SAMESITE: "None"
      MAYAN_CSRF_COOKIE_SAMESITE: "None"
      MAYAN_SESSION_COOKIE_SECURE: "True"  # Required when SameSite=None
      MAYAN_CSRF_COOKIE_SECURE: "True"     # Required when SameSite=None
      
      MAYAN_LOGIN_REDIRECT_URL: /mayan/  # Add trailing slash
      
      # --- CUSTOM APP SETTINGS ---
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "/var/lib/mayan"
      MAYAN_SETTINGS_MODULE: "local_settings"
      # ---------------------------
    healthcheck:
      test: ["CMD-SHELL", "/opt/mayan-edms/bin/python -c \"import sys,urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5); sys.exit(0 if r.status<400 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 10
    ports:
      - "8070:8000"
    networks:
      - services
      - FahimBot_Network
      - mayan_network
    volumes:
      - mayan_app:/var/lib/mayan
      - ./custom_apps/mayan_event_enrichment:/var/lib/mayan/mayan_event_enrichment
      - ./local_settings.py:/var/lib/mayan/local_settings.py
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  mayan-proxy:
    image: python:3.11-slim
    container_name: mayan-proxy
    depends_on:
      - mayan-app
    environment:
      - PROXY_PORT=8075
      - TARGET_URL=http://mayan-app:8000
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_NAME=mayan
      - DB_USER=postgres
      - DB_PASSWORD=@edDGA6QCID9K$$22
    command: ["sh", "-c", "pip install -q psycopg2-binary requests && python /proxy/mayan_proxy.py"]
    volumes:
      - ./mayan_proxy.py:/proxy/mayan_proxy.py
    ports:
      - "8075:8075"
    restart: unless-stopped
    networks:
      - mayan_network

networks:
  mayan_network:
    driver: bridge
  services:
    driver: bridge
  tutor_network:
    driver: bridge
  FahimBot_Network:
    external: true  
    name: FahimBot_Network

volumes:
  pgdata:
  cache:
  mayan_app:
